<html xmlns="http://www.w3.org/1999/xhtml">

<head>
  <title>HEA - Herramienta de Software para enseñanza de árboles.</title>
  <script src="js/arbolb.js?v=2" type="text/javascript"></script>
  <script src="js/arbolBMas.js?v=2" type="text/javascript"></script>
  <script src="js/arbolBEstrella.js?v=2" type="text/javascript"></script>
  <script src="js/configuracion.js?v=2" type="text/javascript"></script>
  <script src="css/configuration_css.js?v=2" type="text/javascript"></script>
  <script src="js/jquery-1.3.2.min.js?v=2" type="text/javascript"></script>
  <script src="js/jquery-ui-1.7.2.custom.min.js?v=2" type="text/javascript"></script>
  <script src="js/canvas2image.js?v=2" type="text/javascript"></script>
  <script src="js/base64.js?v=2" type="text/javascript"></script>
  <script src="js/main.js?v=2" type="text/javascript"></script>
  <link rel="stylesheet" type="text/css" href="css/estilos.css?v=2">
</head>

<body id="cuerpo" class="cuerpo">
  <div id="encabezado" class="encabezado">
    <div id="vinculos">
      <a href="http://www.unlp.edu.ar" target="_blank">UNLP</a> -
      <a href="mailto:emanuel.nucilli@gmail.com">CONTACTO</a>
      <p>V1.0</p>
    </div>
  </div>
  <div id="formulario" class="formulario">
    <form name="form1" method="post" action="" id="form1">
      <div id="eCrearArbol" class="formu">
        <label>Tipo de Árbol<br>
          <select name="tipoArbol" id="tipoArbol" class="seleccion estrella">
            <option value="arbolB">ARBOL B</option>
            <option value="arbolB+">ARBOL B+</option>
            <option value="arbolB*">ARBOL B*</option>
          </select>
        </label>
        <label>Orden<br>
          <input type="text" name="orden" id="orden" onKeyPress="return soloNumeros(event);" maxlength="1"
            class="campo">
          <input name="crearArbol" type="button" value="CREAR" id="crearArbol">
        </label>
      </div>
      <div id="eInsertar" class="formu">
        <label>N&deg; a insertar<br>
          <input type="text" name="numeroAInsertar" id="numeroAInsertar"
            onKeyPress="return soloNumerosEInsercion(event);" maxlength="4" class="campo">
          <input name="insertar" type="button" value=">>" id="insertar" class="boton masmenos">
        </label>
      </div>
      <div id="eEliminar" class="formu">
        <label>N&deg; a eliminar<br>
          <input type="text" name="numeroAEliminar" id="numeroAEliminar"
            onKeyPress="return soloNumerosEInsercion(event);" maxlength="4" class="campo">
          <input name="buscar" type="button" value=">>" id="eliminar" class="boton masmenos">
        </label>
      </div>
      <div id="eBuscar" class="formu">
        <label>N&deg; a buscar<br>
          <input type="text" name="numeroABuscar" id="numeroABuscar" onKeyPress="return soloNumerosEInsercion(event);"
            maxlength="4" class="campo">
          <input name="busco" type="button" value="BUSCAR" id="busco" class="boton">
          <input name="resetear" type="button" value="LIMPIAR" id="resetear" class="boton">
        </label>

        <div id="explicacionBusqueda"></div>
      </div>
      <div id="opcionesArbolEstrella">
        <div id="opcionesArbolEstrellaAdentro">
          <label>POLÍTICA:&nbsp;
            <input type="radio" name="politica" value="izquierda" id="politica" class="boton" checked="true"
              onClick="analizarPolitica(this.form,0)">
            Izq
          </label>
          <label>
            <input type="radio" name="politica" value="derecha" id="politica" class="boton"
              onClick="analizarPolitica(this.form,1)">
            Der
          </label>
          <label>
            <input type="radio" name="politica" value="izquierdaODer" id="politica" class="boton"
              onClick="analizarPolitica(this.form,2)">
            Izq o Der
          </label>
          <label>
            <input type="radio" name="politica" value="derOIzq" id="politica" class="boton"
              onClick="analizarPolitica(this.form,3)">
            Der o Izq
          </label>
          <label>
            <input type="radio" name="politica" value="izqYDer" id="politica" class="boton"
              onClick="analizarPolitica(this.form,4)">
            Izq y Der
          </label>
        </div>
      </div>
    </form>
  </div>
  <div class="limpio"></div>

  <div id="wrapperContenedor" class="wrapperContenedor">

    <div id="wrapperContenedorDos">

      <div id="contenedor">
        <canvas id="enlaces" width="30000" height="1000">
          <p class="mensajeExplorer">HEA es compatible con <a href="http://www.mozilla-europe.org/es/firefox/"
              target="_blank">Mozilla</a>,<a
              href="http://www.google.com/chrome?hl=es-419&brand=CHJL&utm_campaign=es-419&utm_source=es-419-ar-ha-BKWS&utm_medium=ha"
              target="_blank"> Chrome </a>, <a href="http://www.opera.com/" target="_blank">Opera</a> o <a
              href="http://www.apple.com/es/safari/download/"
              target="_blank">Safari</a><!--[if IE]><script type="text/javascript" >deshabilitarBotones();</script><![endif]-->
          </p>
        </canvas>

      </div>&nbsp;
    </div>
  </div>
  <div id="historial" class="historial">
    <h2>Historial de operaciones</h2>
    <div id="explicacionHistorial"></div>
  </div>

  <div id="pie">
    <a href="http://www.info.unlp.edu.ar/index.php" target="_blank">
      <div id="pieLogo"></div>
    </a>

    <div id="pieAdentro">

      <label class="piiLabel">Velocidad de Animaci&oacute;n
        <select name="velocidad" id="velocidad" class="seleccion velocidad">
          <option value="velocidadAlta">ALTA</option>
          <option value="velocidadMedia">MEDIA</option>
          <option value="velocidadBaja">BAJA</option>
        </select>
      </label>
      <input type="button" value="CAMBIAR VISTA" class="boton" name="cambiarVista" id="cambiarVista">
    </div>
  </div>

</body>

</html>
